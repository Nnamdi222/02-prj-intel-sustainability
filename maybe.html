<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intel Sustainability Timeline</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at top, #0b1220, #05070d);
  color: white;
  overflow-x: hidden;
}

html {
  scroll-behavior: smooth;
}

section {
  padding: 60px 8%;
}

/* ================= NAV ================= */

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 14px 8%;
  background: rgba(10, 15, 25, 0.6);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-logo img {
  width: 95px;
  height: auto;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-weight: 500;
}

/* ================= HERO ================= */

.hero {
  height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 90px;
}

.hero h1 {
  font-size: 2.6rem;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.75;
  margin-bottom: 18px;
  line-height: 1.6;
}

.hero-btn {
  padding: 12px 22px;
  background: linear-gradient(90deg, #2b7cff, #00c2ff);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: 600;
}

/* ================= TIMELINE ================= */

.timeline {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 20px;
}

/* MOBILE STACK */
@media (max-width: 768px) {
  .timeline {
    flex-direction: column;
    overflow-x: hidden;
    scroll-snap-type: none;
  }
}

.card {
  min-width: 280px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;

  scroll-snap-align: center;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 30px rgba(0,180,255,0.25);
}

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 16px;
}

.year {
  color: #4db5ff;
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
}

/* HIDDEN DETAILS */
.details {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: 0.4s ease;
  margin-top: 8px;
  color: rgba(255,255,255,0.7);
}

/* REVEAL ON HOVER */
.card:hover .details {
  max-height: 120px;
  opacity: 1;
}

/* ================= IMPACT ================= */

.impact-image {
  width: 420px;
  border-radius: 16px;
  transition: 0.4s;
}

.impact-image:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px rgba(0,180,255,0.2);
}

</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar">

  <div class="nav-logo">
    <img src="img/intel-logo.jpg" alt="Intel Logo">
  </div>

  <ul class="nav-links">
    <li><a href="#timeline">Timeline</a></li>
    <li><a href="#impact">Impact</a></li>
    <li><a href="#future">Future</a></li>
  </ul>

</nav>

<!-- HERO -->
<header class="hero">

  <div>
    <img src="img/intel-logo.jpg" style="width:110px;">
    <h1>Sustainability Through the Ages</h1>
    <p>Explore Intel’s innovation journey from 1968 to 2024.</p>
    <a class="hero-btn" href="#timeline">Explore Timeline</a>
  </div>

</header>

<!-- TIMELINE -->
<section id="timeline">

  <h2>Innovation Timeline</h2>

  <p style="opacity:0.7; margin-bottom:20px;">
    Scroll horizontally on desktop or view stacked on mobile.
  </p>

  <div class="timeline" id="timelineContainer"></div>

</section>

<script>

const timelineData = [
  {
    year: 1968,
    title: "Intel Founded",
    desc: "Intel begins its journey in semiconductor innovation."
  },
  {
    year: 1971,
    title: "First Microprocessor",
    desc: "The Intel 4004 introduces computing on a single chip."
  },
  {
    year: 1978,
    title: "8086 Processor",
    desc: "Defines the x86 architecture still used today."
  },
  {
    year: 1985,
    title: "386 Processor",
    desc: "Introduces 32-bit computing and multitasking."
  },
  {
    year: 2006,
    title: "Energy Efficiency Shift",
    desc: "Intel begins focusing on power-efficient computing."
  },
  {
    year: 2020,
    title: "Sustainability Commitment",
    desc: "Intel announces major carbon reduction goals."
  },
  {
    year: 2023,
    title: "AI Acceleration Era",
    desc: "Intel expands AI-focused hardware platforms."
  },
  {
    year: 2024,
    title: "Green + AI Computing",
    desc: "Intel advances sustainable AI-powered systems."
  }
];

const container = document.getElementById("timelineContainer");

timelineData.forEach(item => {

  container.innerHTML += `
    <div class="card">

      <img src="img/${item.year}-ai.jpg" alt="Intel ${item.year} milestone">

      <div class="card-content">

        <span class="year">${item.year}</span>
        <h3>${item.title}</h3>

        <div class="details">
          <p>${item.desc}</p>
        </div>

      </div>

    </div>
  `;
});

</script>

</body>
</html>
